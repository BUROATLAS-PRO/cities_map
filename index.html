<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Atlas of New Cities</title>

<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.js"></script>

<style>

body {
margin:0;
padding:0;
}

#map{
position:absolute;
top:0;
bottom:0;
width:100%;
}


/* popup */

.mapboxgl-popup {
max-width:320px;
}

.mapboxgl-popup-content{
padding:0;
border-radius:8px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
border:1px solid rgba(0,0,0,0.08);
overflow:hidden;
font-family:Arial, sans-serif;
}

.mapboxgl-popup-close-button{
display:none;
}


/* popup layout */

.city-popup{
padding:20px;
background:white;
color:#1f1f1f;
}

.city-popup__title{
margin:0 0 14px;
font-size:24px;
font-weight:700;
line-height:1.2;
}

.city-popup__title a{
color:#1f1f1f;
text-decoration:none;
}

.city-popup__title a:hover{
text-decoration:underline;
}


/* rows */

.city-popup__row{

display:grid;
grid-template-columns:140px auto;

gap:12px;

align-items:start;

padding:8px 0;

border-top:1px solid #e9e9e9;

}

.city-popup__label{

font-size:14px;
color:#8a8a8a;

}

.city-popup__value{

font-size:14px;

font-weight:600;

color:#1f1f1f;

text-align:left;

}

</style>
</head>

<body>

<div id="map"></div>

<script>

mapboxgl.accessToken = 'pk.eyJ1IjoiZXZnZW5peWEtZGlnaXRhbCIsImEiOiJjbW1hc2wzbDEwZnh5MnBzOXEzZmQ5Zms4In0.54xcK45nfKeeg-Z6-m7cfg';


const map = new mapboxgl.Map({

container:'map',

center:[36.646339,55.776132],

style:'mapbox://styles/evgeniya-digital/cmmatecv1006q01scb0esdbuu',

zoom:2

});


map.addControl(new mapboxgl.NavigationControl(),'top-right');



function escapeHtml(value){

return String(value ?? '')

.replace(/&/g,'&amp;')

.replace(/</g,'&lt;')

.replace(/>/g,'&gt;')

.replace(/"/g,'&quot;')

.replace(/'/g,'&#39;');

}


function formatValue(value){

if(value===null || value===undefined || value==="")

return "—";

return escapeHtml(value);

}



function buildPopupHtml(properties){

const website = properties["website"];

const title = properties["Name"] || "";


const rows = [

["Страна",properties["Country"]],

["Анонсирован",properties["Year of project announcement"]],

["Тип территории",properties["Category"]],

["Статус проекта",properties["Project status"]],

["Площадь, км²",properties["Area (km²)"]]

];


const rowsHtml = rows.map(([label,value])=>`

<div class="city-popup__row">

<div class="city-popup__label">${escapeHtml(label)}</div>

<div class="city-popup__value">${formatValue(value)}</div>

</div>

`).join("");


const titleHtml = website

? `<a href="${escapeHtml(website)}" target="_blank">${escapeHtml(title)}</a>`

: escapeHtml(title);


return `

<div class="city-popup">

<h3 class="city-popup__title">${titleHtml}</h3>

${rowsHtml}

</div>

`;

}



map.on("load",()=>{


const layers = ["new-cities-dot"];


let popup = null;


layers.forEach((layer,index)=>{


map.addInteraction(`hover-${index}`,{

type:"mouseenter",

target:{layerId:layer},

handler:(e)=>{


map.getCanvas().style.cursor="pointer";


const coordinates = [...e.feature.geometry.coordinates];

const properties = e.feature.properties || {};


if(popup) popup.remove();


popup = new mapboxgl.Popup({

closeButton:false,

closeOnClick:false,

offset:[0,-12]

})

.setLngLat(coordinates)

.setHTML(buildPopupHtml(properties))

.addTo(map);

}

});


map.addInteraction(`leave-${index}`,{

type:"mouseleave",

target:{layerId:layer},

handler:()=>{

map.getCanvas().style.cursor="";


if(popup){

popup.remove();

popup=null;

}

}

});


});

});


</script>

</body>

</html>
