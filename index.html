<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Atlas of New Cities</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.js"></script>

<style>
  :root{
    --bg:#f5f5f3;
    --text:#1f1f1f;
    --muted:#7a7a7a;
    --line:#d9d9d9;
    --panel:#ffffff;
    --preview:#d9d9d9;
    --active:#111111;
  }

  *{
    box-sizing:border-box;
  }

  html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:var(--bg);
    font-family:Arial,sans-serif;
    color:var(--text);
  }

  .app{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    background:var(--bg);
  }

  .top-ui{
    display:grid;
    grid-template-columns: 240px 1fr;
    gap:16px;
    padding:18px 24px 10px;
    align-items:start;
    z-index:2;
  }

  .legend-panel{
    min-height:84px;
    background:var(--panel);
    border:1px solid #8f8f8f;
    padding:10px 12px;
  }

  .legend-title{
    margin:0 0 8px;
    font-size:14px;
    line-height:1.2;
    font-weight:400;
    color:#ff5a00;
  }

  .legend-items{
    display:flex;
    flex-direction:column;
    gap:4px;
  }

  .legend-item{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    line-height:1.2;
    color:#1f1f1f;
  }

  .legend-dot{
    width:10px;
    height:10px;
    border-radius:50%;
    flex:0 0 10px;
    background:#cfcfcf;
  }

  .legend-size-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:6px;
    font-size:12px;
    color:#1f1f1f;
  }

  .size-dot{
    border-radius:50%;
    background:#cfcfcf;
    flex:0 0 auto;
  }

  .tabs{
    display:grid;
    grid-template-columns: repeat(4, minmax(140px, 1fr));
    gap:10px;
    align-items:start;
  }

  .tab{
    border:1px solid transparent;
    background:#d9d9d9;
    cursor:pointer;
    padding:0;
    text-align:left;
    color:inherit;
  }

  .tab.is-active{
    border-color:#8f8f8f;
    background:#f7f7f7;
  }

  .tab-preview{
    height:58px;
    background:#d9d9d9;
  }

  .tab-label-wrap{
    padding:8px 10px 10px;
  }

  .tab-map-title{
    display:block;
    font-size:12px;
    color:#233cff;
    margin-bottom:4px;
  }

  .tab-mode-label{
    display:block;
    font-size:12px;
    color:#ff5a00;
    line-height:1.15;
  }

  .map-wrap{
    position:relative;
    flex:1 1 auto;
    min-height:420px;
    padding:0 24px 24px;
  }

  #map{
    position:relative;
    width:100%;
    height:100%;
    min-height:420px;
    background:#d9d9d9;
  }

  /* popup */
  .mapboxgl-popup{
    max-width:400px;
  }

  .mapboxgl-popup-content{
    padding:0;
    border-radius:8px;
    border:1px solid rgba(0,0,0,0.08);
    box-shadow:0 8px 18px rgba(0,0,0,0.14);
    background:white;
    overflow:hidden;
  }

  .city-popup{
    padding:14px 16px;
    font-family:Arial,sans-serif;
    color:#1a1a1a;
  }

  .city-popup__title{
    margin:0 0 8px;
    font-size:18px;
    line-height:1.2;
    font-weight:700;
  }

  .city-popup__title a{
    color:#1a1a1a;
    text-decoration:none;
  }

  .city-popup__ext{
    display:inline-block;
    font-size:12px;
    margin-left:4px;
    color:#777;
    border-bottom:1px solid #888;
    line-height:1;
    transform:translateY(-1px);
  }

  .city-popup__table{
    border-top:1px solid #ececec;
    margin-top:4px;
  }

  .city-popup__row{
    display:grid;
    grid-template-columns:140px 1fr;
    gap:12px;
    padding:8px 0;
    border-top:1px solid #f0f0f0;
  }

  .city-popup__row:first-child{
    border-top:none;
  }

  .city-popup__label{
    font-size:13px;
    color:#8c8c8c;
    line-height:1.3;
  }

  .city-popup__value{
    font-size:13px;
    font-weight:600;
    color:#1f1f1f;
    text-align:left;
    line-height:1.35;
    overflow-wrap:anywhere;
  }

  /* hover tooltip */
  .city-hover-tooltip.mapboxgl-popup{
    max-width:180px;
  }

  .city-hover-tooltip .mapboxgl-popup-content{
    padding:4px 7px;
    border-radius:4px;
    border:none;
    box-shadow:0 3px 10px rgba(0,0,0,0.18);
    background:rgba(0,0,0,0.85);
    color:white;
    font-family:Arial,sans-serif;
    font-size:10px;
    line-height:1.2;
  }

  .city-hover-tooltip .mapboxgl-popup-tip{
    border-top-color:rgba(0,0,0,0.85)!important;
  }

  .city-hover-tooltip .mapboxgl-popup-close-button{
    display:none;
  }

  @media (max-width: 900px){
    .top-ui{
      grid-template-columns:1fr;
    }

    .tabs{
      grid-template-columns: repeat(2, minmax(140px, 1fr));
    }

    .legend-panel{
      min-height:auto;
    }
  }
</style>
</head>

<body>
<div class="app">
  <div class="top-ui">
    <div class="legend-panel">
      <h3 class="legend-title" id="legend-title">Все города</h3>
      <div class="legend-items" id="legend-items"></div>
      <div class="legend-size-row" id="legend-size-row" style="display:none;"></div>
    </div>

    <div class="tabs" id="tabs"></div>
  </div>

  <div class="map-wrap">
    <div id="map"></div>
  </div>
</div>

<script>
mapboxgl.accessToken='pk.eyJ1IjoiZXZnZW5peWEtZGlnaXRhbCIsImEiOiJjbW1hc2wzbDEwZnh5MnBzOXEzZmQ5Zms4In0.54xcK45nfKeeg-Z6-m7cfg';

const MODES = {
  allCities: {
    key: 'allCities',
    tabTitle: 'Карта 1',
    label: 'Все города',
    legendTitle: 'Все города',
    type: 'fixed'
  },
  cityType: {
    key: 'cityType',
    tabTitle: 'Карта 2',
    label: 'Тип города',
    legendTitle: 'Тип города',
    type: 'categorical',
    property: 'Category',
    colors: {
      'new city': '#111111',
      'satellite city': '#bdbdbd'
    },
    legend: [
      { label: 'новый город', color: '#111111' },
      { label: 'город-спутник', color: '#bdbdbd' }
    ]
  },
  projectStatus: {
    key: 'projectStatus',
    tabTitle: 'Карта 3',
    label: 'Статус проекта',
    legendTitle: 'Статус проекта',
    type: 'categorical',
    property: 'Project status',
    colors: {
      'active': '#111111',
      'implemented': '#5a5a5a',
      'speculative': '#bdbdbd',
      'under development': '#8f8f8f'
    },
    legend: [
      { label: 'active', color: '#111111' },
      { label: 'implemented', color: '#5a5a5a' },
      { label: 'speculative', color: '#bdbdbd' },
      { label: 'under development', color: '#8f8f8f' }
    ]
  },
  area: {
    key: 'area',
    tabTitle: 'Карта 4',
    label: 'Площадь',
    legendTitle: 'Площадь, км2',
    type: 'size',
    property: 'Area (km²)',
    legendMin: '1',
    legendMax: '120'
  }
};

let activeMode = 'allCities';
let popup = null;
let tooltip = null;

const map = new mapboxgl.Map({
  container:'map',
  center:[15,18],
  zoom:1.1,
  style:'mapbox://styles/evgeniya-digital/cmmatecv1006q01scb0esdbuu'
});

map.addControl(new mapboxgl.NavigationControl(),'top-right');
map.scrollZoom.disable();

function escapeHtml(value){
  return String(value ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function formatValue(value){
  if(value===null || value===undefined || value==="") return "—";
  return escapeHtml(value);
}

function normalizeUrl(url){
  if(!url) return "";
  const trimmed=String(url).trim();
  if(!trimmed) return "";
  if(/^https?:\/\//i.test(trimmed)) return trimmed;
  return "https://"+trimmed;
}

function buildPopupHtml(properties){
  const rows=[
    ["Страна",properties["Country"]],
    ["Анонсирован",properties["Year of project announcement"]],
    ["Тип территории",properties["Category"]],
    ["Статус проекта",properties["Project status"]],
    ["Площадь, км²",properties["Area (km²)"]]
  ];

  const rowsHtml=rows.map(([label,value])=>`
    <div class="city-popup__row">
      <div class="city-popup__label">${escapeHtml(label)}</div>
      <div class="city-popup__value">${formatValue(value)}</div>
    </div>
  `).join("");

  const title=formatValue(properties["Name"]);
  const website=normalizeUrl(properties["website"]);

  const titleHtml=website
    ? `<a href="${escapeHtml(website)}" target="_blank" rel="noopener noreferrer">${title}<span class="city-popup__ext">↗</span></a>`
    : title;

  return `
    <div class="city-popup">
      <h3 class="city-popup__title">${titleHtml}</h3>
      <div class="city-popup__table">
        ${rowsHtml}
      </div>
    </div>
  `;
}

function renderTabs(){
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';

  Object.values(MODES).forEach(mode => {
    const btn = document.createElement('button');
    btn.className = `tab ${activeMode === mode.key ? 'is-active' : ''}`;
    btn.type = 'button';
    btn.dataset.mode = mode.key;

    btn.innerHTML = `
      <div class="tab-preview"></div>
      <div class="tab-label-wrap">
        <span class="tab-map-title">${mode.tabTitle}</span>
        <span class="tab-mode-label">${mode.label}</span>
      </div>
    `;

    btn.addEventListener('click', () => {
      activeMode = mode.key;
      applyMode();
      renderTabs();
      renderLegend();
    });

    tabs.appendChild(btn);
  });
}

function renderLegend(){
  const mode = MODES[activeMode];
  const title = document.getElementById('legend-title');
  const items = document.getElementById('legend-items');
  const sizeRow = document.getElementById('legend-size-row');

  title.textContent = mode.legendTitle;
  items.innerHTML = '';
  sizeRow.innerHTML = '';
  sizeRow.style.display = 'none';

  if (mode.type === 'fixed') {
    return;
  }

  if (mode.type === 'categorical') {
    mode.legend.forEach(item => {
      const row = document.createElement('div');
      row.className = 'legend-item';
      row.innerHTML = `
        <span class="legend-dot" style="background:${item.color}"></span>
        <span>${item.label}</span>
      `;
      items.appendChild(row);
    });
  }

  if (mode.type === 'size') {
    sizeRow.style.display = 'flex';
    sizeRow.innerHTML = `
      <span>${mode.legendMin}</span>
      <span class="size-dot" style="width:14px;height:14px;"></span>
      <span class="size-dot" style="width:26px;height:26px;"></span>
      <span class="size-dot" style="width:40px;height:40px;"></span>
      <span>${mode.legendMax}</span>
    `;
  }
}

function getDefaultRadiusExpression(){
  return [
    'interpolate',
    ['linear'],
    ['zoom'],
    0, 1.5,
    6, 2.5,
    10, 4
  ];
}

function getAreaRadiusExpression(){
  return [
    'interpolate',
    ['linear'],
    ['to-number', ['coalesce', ['get', 'Area (km²)'], 0]],
    1, 2,
    20, 4,
    60, 7,
    120, 10
  ];
}

function categoricalColorExpression(property, colors, fallback='#bdbdbd'){
  const expr = ['match', ['downcase', ['coalesce', ['get', property], '']]];
  Object.entries(colors).forEach(([key, value]) => {
    expr.push(key.toLowerCase(), value);
  });
  expr.push(fallback);
  return expr;
}

function applyMode(){
  if (!map.getLayer('new-cities-dot')) return;

  if (activeMode === 'allCities') {
    map.setPaintProperty('new-cities-dot', 'circle-color', '#111111');
    map.setPaintProperty('new-cities-dot', 'circle-opacity', 1);
    map.setPaintProperty('new-cities-dot', 'circle-radius', getDefaultRadiusExpression());
  }

  if (activeMode === 'cityType') {
    map.setPaintProperty(
      'new-cities-dot',
      'circle-color',
      categoricalColorExpression(MODES.cityType.property, MODES.cityType.colors, '#d0d0d0')
    );
    map.setPaintProperty('new-cities-dot', 'circle-opacity', 1);
    map.setPaintProperty('new-cities-dot', 'circle-radius', getDefaultRadiusExpression());
  }

  if (activeMode === 'projectStatus') {
    map.setPaintProperty(
      'new-cities-dot',
      'circle-color',
      categoricalColorExpression(MODES.projectStatus.property, MODES.projectStatus.colors, '#d0d0d0')
    );
    map.setPaintProperty('new-cities-dot', 'circle-opacity', 1);
    map.setPaintProperty('new-cities-dot', 'circle-radius', getDefaultRadiusExpression());
  }

  if (activeMode === 'area') {
    map.setPaintProperty('new-cities-dot', 'circle-color', '#bdbdbd');
    map.setPaintProperty('new-cities-dot', 'circle-opacity', 0.65);
    map.setPaintProperty('new-cities-dot', 'circle-radius', getAreaRadiusExpression());
  }
}

map.on('load',()=>{

  map.addSource('selected-city',{
    type:'geojson',
    data:{
      type:'FeatureCollection',
      features:[]
    }
  });

  map.addLayer({
    id:'selected-city-dot',
    type:'circle',
    source:'selected-city',
    paint:{
      'circle-radius':4,
      'circle-color':'#2F6BFF'
    }
  });

  applyMode();
  renderTabs();
  renderLegend();

  map.addInteraction("hover-city",{
    type:"mouseenter",
    target:{layerId:"new-cities-dot"},
    handler:(e)=>{
      map.getCanvas().style.cursor='pointer';

      const feature=e.feature;
      const coordinates=[...feature.geometry.coordinates];
      const name=feature.properties.Name;

      if(tooltip) tooltip.remove();

      tooltip=new mapboxgl.Popup({
        closeButton:false,
        closeOnClick:false,
        offset:[0,-10],
        className:"city-hover-tooltip"
      })
      .setLngLat(coordinates)
      .setHTML(escapeHtml(name))
      .addTo(map);
    }
  });

  map.addInteraction("leave-city",{
    type:"mouseleave",
    target:{layerId:"new-cities-dot"},
    handler:()=>{
      map.getCanvas().style.cursor='';

      if(tooltip){
        tooltip.remove();
        tooltip=null;
      }
    }
  });

  map.addInteraction("click-city",{
    type:"click",
    target:{layerId:"new-cities-dot"},
    handler:(e)=>{

      const feature=e.feature;
      const coordinates=[...feature.geometry.coordinates];
      const properties=feature.properties;

      if(tooltip){
        tooltip.remove();
        tooltip=null;
      }

      map.getSource('selected-city').setData({
        type:'FeatureCollection',
        features:[{
          type:'Feature',
          geometry:{
            type:'Point',
            coordinates
          }
        }]
      });

      if(popup) popup.remove();

      popup=new mapboxgl.Popup({
        offset:[0,-12],
        maxWidth:'400px'
      })
      .setLngLat(coordinates)
      .setHTML(buildPopupHtml(properties))
      .addTo(map);
    }
  });
});
</script>
</body>
</html>
