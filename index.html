<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Atlas of New Cities</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.js"></script>

<style>
body {
  margin: 0;
  padding: 0;
}

#map {
  position: absolute;
  inset: 0;
  width: 100%;
}

/* Popup shell */
.mapboxgl-popup {
  max-width: 360px;
}

.mapboxgl-popup-content {
  padding: 0;
  border-radius: 8px;
  border: 1px solid rgba(0, 0, 0, 0.08);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.16);
  overflow: hidden;
  background: #fff;
}

.mapboxgl-popup-close-button {
  display: none;
}

.mapboxgl-popup-tip {
  border-top-color: #fff !important;
}

/* Popup card */
.city-popup {
  padding: 20px 20px 16px;
  background: #fff;
  color: #1a1a1a;
  font-family: Arial, sans-serif;
}

.city-popup__title {
  margin: 0 0 14px;
  font-size: 24px;
  line-height: 1.15;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.city-popup__title a {
  color: #1a1a1a;
  text-decoration: none;
}

.city-popup__title a:hover {
  text-decoration: underline;
}

.city-popup__table {
  border-top: 1px solid #e8e8e8;
}

.city-popup__row {
  display: grid;
  grid-template-columns: 148px 1fr;
  column-gap: 14px;
  align-items: start;
  padding: 9px 0;
  border-top: 1px solid #efefef;
}

.city-popup__row:first-child {
  border-top: none;
}

.city-popup__label {
  font-size: 13px;
  line-height: 1.3;
  color: #8b8b8b;
}

.city-popup__value {
  font-size: 13px;
  line-height: 1.3;
  font-weight: 600;
  color: #1f1f1f;
  text-align: left;
  word-break: break-word;
}

/* Mobile */
@media (max-width: 640px) {
  .mapboxgl-popup {
    max-width: 300px;
  }

  .city-popup {
    padding: 16px 16px 12px;
  }

  .city-popup__title {
    font-size: 20px;
    margin-bottom: 12px;
  }

  .city-popup__row {
    grid-template-columns: 120px 1fr;
    column-gap: 12px;
    padding: 8px 0;
  }

  .city-popup__label,
  .city-popup__value {
    font-size: 12px;
  }
}
</style>
</head>

<body>
<div id="map"></div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiZXZnZW5peWEtZGlnaXRhbCIsImEiOiJjbW1hc2wzbDEwZnh5MnBzOXEzZmQ5Zms4In0.54xcK45nfKeeg-Z6-m7cfg';

const map = new mapboxgl.Map({
  container: 'map',
  center: [15, 18],
  style: 'mapbox://styles/evgeniya-digital/cmmatecv1006q01scb0esdbuu',
  zoom: 1.1,
  minZoom: 1.1,
  maxBounds: [
    [-180, -85],
    [180, 85]
  ]
});

map.addControl(new mapboxgl.NavigationControl(), 'top-right');

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatValue(value) {
  if (value === null || value === undefined || value === '') return '—';
  return escapeHtml(value);
}

function normalizeUrl(url) {
  if (!url) return '';
  const trimmed = String(url).trim();
  if (!trimmed) return '';
  if (/^https?:\/\//i.test(trimmed)) return trimmed;
  return `https://${trimmed}`;
}

function buildPopupHtml(properties) {
  const rows = [
    ['Страна', properties['Country']],
    ['Анонсирован', properties['Year of project announcement']],
    ['Тип территории', properties['Category']],
    ['Статус проекта', properties['Project status']],
    ['Площадь, км²', properties['Area (km²)']]
  ];

  const rowsHtml = rows.map(([label, value]) => `
    <div class="city-popup__row">
      <div class="city-popup__label">${escapeHtml(label)}</div>
      <div class="city-popup__value">${formatValue(value)}</div>
    </div>
  `).join('');

  const title = formatValue(properties['Name']);
  const website = normalizeUrl(properties['website']);

  const titleHtml = website
    ? `<a href="${escapeHtml(website)}" target="_blank" rel="noopener noreferrer">${title}</a>`
    : title;

  return `
    <div class="city-popup">
      <h3 class="city-popup__title">${titleHtml}</h3>
      <div class="city-popup__table">
        ${rowsHtml}
      </div>
    </div>
  `;
}

map.on('load', () => {
  const hoverLayers = ['new-cities-dot'];
  let hoverPopup = null;

  hoverLayers.forEach((layer, index) => {
    map.addInteraction(`hover-enter-${index}`, {
      type: 'mouseenter',
      target: { layerId: layer },
      handler: (e) => {
        map.getCanvas().style.cursor = 'pointer';

        const coordinates = [...e.feature.geometry.coordinates];
        const properties = e.feature.properties || {};

        if (hoverPopup) hoverPopup.remove();

        hoverPopup = new mapboxgl.Popup({
          closeButton: false,
          closeOnClick: false,
          offset: [0, -14]
        })
          .setLngLat(coordinates)
          .setHTML(buildPopupHtml(properties))
          .addTo(map);
      }
    });

    map.addInteraction(`hover-leave-${index}`, {
      type: 'mouseleave',
      target: { layerId: layer },
      handler: () => {
        map.getCanvas().style.cursor = '';
        if (hoverPopup) {
          hoverPopup.remove();
          hoverPopup = null;
        }
      }
    });
  });
});

window.addEventListener('resize', () => {
  map.resize();
});
</script>
</body>
</html>
