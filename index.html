<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Atlas of New Cities</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.js"></script>

<style>
:root{
  --bg:#ffffff;
  --text:#000000;
  --muted:#6f6f6f;
  --line:#d9d9d9;
  --panel:#ffffff;
  --panel-inactive:#f2f2f2;
  --preview:#d9d9d9;
  --radius:5px;
  --preview-radius:3px;
  --font-main:"Forma DJR Cyrillic Text","Forma DJR Cyrillic","Inter","Arial",sans-serif;
}

*{box-sizing:border-box;}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:var(--bg);
  font-family:var(--font-main);
  color:var(--text);
}

body{overflow:hidden;}

.app{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  background:var(--bg);
}

.top-ui{
  display:grid;
  grid-template-columns:200px 1fr;
  gap:10px;
  padding:0;
  align-items:start;
  z-index:2;
  flex:0 0 auto;
  margin:0;
}

.legend-panel{
  min-height:70px;
  background:var(--panel);
  border:none;
  padding:6px 10px 6px 0;
  display:flex;
  flex-direction:column;
}

.legend-title{
  margin:0 0 5px;
  font-size:11px;
  line-height:1.15;
  font-weight:400;
  color:#000;
}

.tabs{
  display:grid;
  grid-template-columns:repeat(4,minmax(140px,1fr));
  gap:0;
}

.tab{
  border:1px solid var(--line);
  background:var(--panel-inactive);
  cursor:pointer;
  padding:0;
  text-align:left;
  border-radius:var(--radius);
  overflow:hidden;
  appearance:none;
}

.tab.is-active{
  background:#ffffff !important;
  border-color:var(--line);
}

.tab.is-active .tab-preview{
  background-color:#ffffff;
}

.tab-preview{
  position:relative;
  height:70px;
  background-color:var(--preview);
  background-size:contain;
  background-position:center center;
  background-repeat:no-repeat;
  border-top-left-radius:var(--preview-radius);
  border-top-right-radius:var(--preview-radius);
  display:flex;
  align-items:flex-end;
}

.tab-label-wrap{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  padding:8px 12px;
}

.tab-mode-label{
  font-size:11px;
  color:#000;
}

.map-wrap{
  position:relative;
  flex:1 1 auto;
  min-height:300px;
  margin:10px;
  margin-top:8px;
}

#map{
  width:100%;
  height:100%;
  min-height:300px;
  background:#fff;
}
</style>
</head>

<body>

<div class="app">

<div class="top-ui">

<div class="legend-panel">
<h3 class="legend-title">Все города</h3>
</div>

<div class="tabs">

<button class="tab is-active">
<div class="tab-preview">
<div class="tab-label-wrap">
<span class="tab-mode-label">Все города</span>
</div>
</div>
</button>

<button class="tab">
<div class="tab-preview">
<div class="tab-label-wrap">
<span class="tab-mode-label">Тип города</span>
</div>
</div>
</button>

<button class="tab">
<div class="tab-preview">
<div class="tab-label-wrap">
<span class="tab-mode-label">Статус проекта</span>
</div>
</div>
</button>

<button class="tab">
<div class="tab-preview">
<div class="tab-label-wrap">
<span class="tab-mode-label">Площадь</span>
</div>
</div>
</button>

</div>
</div>

<div class="map-wrap">
<div id="map"></div>
</div>

</div>

<script>

mapboxgl.accessToken = 'YOUR_MAPBOX_TOKEN';

const map = new mapboxgl.Map({
container:'map',
center:[15,18],
zoom:1.1,
style:'mapbox://styles/mapbox/light-v11'
});

map.addControl(new mapboxgl.NavigationControl(),'top-right');

</script>

</body>
</html>
