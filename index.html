<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Atlas of New Cities</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.js"></script>

<style>
  :root{
    --bg:#ffffff;
    --text:#000000;
    --muted:#6f6f6f;
    --line:#d9d9d9;
    --panel:#ffffff;
    --panel-inactive:#f2f2f2;
    --preview:#d9d9d9;
    --radius:5px;
    --preview-radius:3px;
    --font-main:"Forma DJR Cyrillic Text","Forma DJR Cyrillic","Inter","Arial",sans-serif;
  }

  *{
    box-sizing:border-box;
  }

  html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:var(--bg);
    font-family:var(--font-main);
    color:var(--text);
  }

  body{
    overflow:hidden;
  }

  .app{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    background:var(--bg);
  }

  .top-ui{
    display:flex;
    padding:0;
    align-items:start;
    z-index:2;
    flex:0 0 auto;
    margin:0;
  }

  /* --- Легенда: плавает поверх карты в левом верхнем углу --- */
  .legend-panel{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
    background:var(--panel);
    border:none;
    padding:8px 12px;
    margin:0;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    border-radius:var(--radius);
    transition:opacity 0.15s ease;
  }

  /* При наведении мыши легенда становится полупрозрачной, чтобы не мешала смотреть карту */
  .legend-panel:hover{
    opacity:0.25;
  }

  .legend-title{
    margin:0 0 5px;
    font-size:11px;
    line-height:1.15;
    font-weight:400;
    color:#000000;
    font-family:var(--font-main);
  }

  .legend-items{
    display:flex;
    flex-direction:column;
    gap:3px;
    transition:opacity 0.3s ease;
  }

  .legend-item{
    display:flex;
    align-items:center;
    gap:7px;
    font-size:10px;
    line-height:1.1;
    color:var(--text);
    font-family:var(--font-main);
  }

  .legend-dot{
    width:8px;
    height:8px;
    border-radius:50%;
    flex:0 0 8px;
    background:#cfcfcf;
  }

  .legend-size-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:4px;
    font-size:10px;
    color:var(--text);
    font-family:var(--font-main);
    transition:opacity 0.3s ease;
  }

  .size-dot{
    border-radius:50%;
    background:#cfcfcf;
    flex:0 0 auto;
  }

  /* ======================================================================
     ВЕРХНИЕ КНОПКИ (табы с превью-картинками)
     ====================================================================== */

  .tabs{
    display:grid;
    grid-template-columns: repeat(4, minmax(140px, 1fr));
    gap:0;                  /* РАССТОЯНИЕ МЕЖДУ КНОПКАМИ: поменяй 0 на нужное, например 5px или 10px */
    align-items:start;
    margin:0;
    flex:1;
  }

  /* --- Стиль НЕАКТИВНОЙ кнопки (по умолчанию) --- */
  .tab{
    border:1px solid var(--line) !important;
    background:var(--panel-inactive) !important;   /* Цвет фона неактивной кнопки (сейчас светло-серый #f2f2f2) */
    cursor:pointer;
    padding:0;
    text-align:left;
    color:inherit;
    -webkit-appearance:none;
    -moz-appearance:none;
    appearance:none;
    border-radius:var(--radius);
    margin:0;
    overflow:hidden;
    transition:background 0.15s ease, border-color 0.15s ease;
  }

  /* --- Стиль АКТИВНОЙ (нажатой) кнопки --- */
  /* При клике кнопка получает класс is-active и становится белой */
  .tab.is-active{
    background:#ffffff !important;    /* Цвет фона активной кнопки — белый */
    border-color:var(--line);
  }

  /* --- Область с превью-картинкой внутри кнопки --- */
  .tab-preview{
    position:relative;
    height:70px;            /* ВЫСОТА КНОПОК: поменяй это число, чтобы изменить высоту верхних кнопок (сейчас 70px) */
    /*background-color:var(--preview);*/
    background-size:contain;
    background-position:center center;
    background-repeat:no-repeat;
    border-top-left-radius:var(--preview-radius);
    border-top-right-radius:var(--preview-radius);
    display:flex;
    align-items:flex-end;
    justify-content:flex-start;
  }

  .tab-preview::after{
    content:"";
    position:absolute;
    inset:0;
    background:transparent;
  }

  .tab-label-wrap{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    z-index:1;
    padding:8px 12px 12px;
    background:transparent;
  }

  .tab-mode-label{
    display:block;
    font-size:11px;
    color:#000000;
    line-height:1.1;
    font-family:var(--font-main);
    font-weight:400;
    transition:font-weight 0.15s ease;
  }

  .tab.is-active .tab-mode-label{
    font-weight:700;
  }

  /* --- Обёртка карты --- */
  .map-wrap{
    position:relative;
    flex:1 1 auto;
    min-height:300px;
    padding:0;
    margin:10px;            /* РАССТОЯНИЕ МЕЖДУ КНОПКАМИ И КАРТОЙ: поменяй верхнее значение, например margin:20px 10px 10px 10px; */
  }

  #map{
    position:relative;
    width:100%;
    height:100%;
    min-height:300px;
    background:#ffffff;
  }

  /* popup */
  .mapboxgl-popup{
    max-width:400px;
    animation:fadeIn 0.15s ease;
  }

  .mapboxgl-popup-content{
    padding:0;
    border-radius:8px;
    border:1px solid rgba(0,0,0,0.08);
    box-shadow:0 8px 18px rgba(0,0,0,0.14);
    background:white;
    overflow:hidden;
    font-family:var(--font-main);
  }

  @keyframes fadeIn{
    from{opacity:0;transform:translateY(4px)}
    to{opacity:1;transform:translateY(0)}
  }

  .city-popup{
    padding:14px 16px;
    font-family:var(--font-main);
    color:#1a1a1a;
  }

  .city-popup__title{
    margin:0 0 8px;
    font-size:18px;
    line-height:1.2;
    font-weight:700;
    font-family:var(--font-main);
  }

  .city-popup__title a{
    color:#1a1a1a;
    text-decoration:none;
  }

  .city-popup__ext{
    display:inline-block;
    font-size:12px;
    margin-left:4px;
    color:#777;
    border-bottom:1px solid #888;
    line-height:1;
    transform:translateY(-1px);
  }

  .city-popup__table{
    border-top:1px solid #ececec;
    margin-top:4px;
  }

  .city-popup__row{
    display:grid;
    grid-template-columns:140px 1fr;
    gap:12px;
    padding:8px 0;
    border-top:1px solid #f0f0f0;
  }

  .city-popup__row:first-child{
    border-top:none;
  }

  .city-popup__label{
    font-size:13px;
    color:#8c8c8c;
    line-height:1.3;
    font-family:var(--font-main);
  }

  .city-popup__value{
    font-size:13px;
    font-weight:600;
    color:#1f1f1f;
    text-align:left;
    line-height:1.35;
    overflow-wrap:anywhere;
    font-family:var(--font-main);
  }

  /* hover tooltip */
  .city-hover-tooltip.mapboxgl-popup{
    max-width:180px;
  }

  .city-hover-tooltip .mapboxgl-popup-content{
    padding:4px 7px;
    border-radius:4px;
    border:none;
    box-shadow:0 3px 10px rgba(0,0,0,0.18);
    background:rgba(0,0,0,0.85);
    color:white;
    font-family:var(--font-main);
    font-size:10px;
    line-height:1.2;
  }

  .city-hover-tooltip .mapboxgl-popup-tip{
    border-top-color:rgba(0,0,0,0.85)!important;
  }

  .city-hover-tooltip .mapboxgl-popup-close-button{
    display:none;
  }

  @media (max-width: 900px){
    body{
      overflow:auto;
    }

    .app{
      height:auto;
      min-height:100%;
    }

    .top-ui{
      display:flex;
    }

    .tabs{
      grid-template-columns: repeat(2, minmax(140px, 1fr));
    }

    .map-wrap{
      height:500px;
    }
  }
</style>
</head>

<body>
<div class="app">
  <div class="top-ui">
    <div class="tabs" id="tabs"></div>
  </div>

  <div class="map-wrap">
    <div class="legend-panel">
      <h3 class="legend-title" id="legend-title">Все города</h3>
      <div class="legend-items" id="legend-items"></div>
      <div class="legend-size-row" id="legend-size-row" style="display:none;"></div>
    </div>
    <div id="map"></div>
  </div>
</div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiZXZnZW5peWEtZGlnaXRhbCIsImEiOiJjbW1hc2wzbDEwZnh5MnBzOXEzZmQ5Zms4In0.54xcK45nfKeeg-Z6-m7cfg';

const MODES = {
  allCities: {
    key: 'allCities',
    label: 'Все города',
    legendTitle: 'Все города',
    type: 'fixed',
    preview: './previews/all-cities.png'
  },
  cityType: {
    key: 'cityType',
    label: 'Тип города',
    legendTitle: 'Тип города',
    type: 'categorical',
    property: 'Category',
    preview: './previews/city-type.png',
    colors: {
      'new city': '#C78B28',
      'satellite city': '#FEC042'
    },
    // Подписи в легенде для «Тип города» — меняй текст в label на нужный русский вариант
    legend: [
      { label: 'новый город', color: '#C78B28' },
      { label: 'город-спутник', color: '#FEC042' }
    ]
  },
  projectStatus: {
    key: 'projectStatus',
    label: 'Статус проекта',
    legendTitle: 'Статус проекта',
    type: 'categorical',
    property: 'Project status',
    preview: './previews/project-status.png',
    // ВАЖНО: ключи в colors (слева) — это значения из данных, их НЕЛЬЗЯ менять!
    // Они должны совпадать с тем, что приходит из таблицы/данных карты.
    colors: {
      'active': '#ACCA71',
      'implemented': '#4984AC',
      'speculative': '#B3B3B3',
      'under development': '#FEA54D'
    },
    // КАК ПЕРЕИМЕНОВАТЬ ПОДПИСИ В ЛЕГЕНДЕ:
    // Меняй только текст в label (в кавычках после слова label).
    // Например, чтобы вместо "active" было "Активный" — замени 'active' на 'Активный'.
    // Ключи в colors выше трогать НЕЛЬЗЯ — они привязаны к данным.
    legend: [
      { label: 'active', color: '#ACCA71' },               // <- замени 'active' на 'Активный'
      { label: 'implemented', color: '#4984AC' },           // <- замени 'implemented' на 'Реализован'
      { label: 'speculative', color: '#B3B3B3' },           // <- замени 'speculative' на 'Спекулятивный'
      { label: 'under development', color: '#FEA54D' }      // <- замени 'under development' на 'В разработке'
    ]
  },
  area: {
    key: 'area',
    label: 'Площадь',
    legendTitle: 'Площадь, км²',
    type: 'size',
    property: 'Area (km²)',
    preview: './previews/area.png',
    legendMin: '1',
    legendMax: '120',
    color: '#4984AC'
  }
};

let activeMode = 'allCities';
let popup = null;
let tooltip = null;

const map = new mapboxgl.Map({
  container: 'map',
  center: [15, 18],
  zoom: 1.1,
  style: 'mapbox://styles/evgeniya-digital/cmmatecv1006q01scb0esdbuu'
});

map.addControl(new mapboxgl.NavigationControl(), 'top-right');
map.scrollZoom.disable();

function escapeHtml(value){
  return String(value ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function formatValue(value){
  if(value===null || value===undefined || value==="") return "—";
  return escapeHtml(value);
}

function normalizeUrl(url){
  if(!url) return "";
  const trimmed = String(url).trim();
  if(!trimmed) return "";
  if(/^https?:\/\//i.test(trimmed)) return trimmed;
  return "https://" + trimmed;
}

function buildPopupHtml(properties){
  const rows = [
    ["Страна",properties["Country"]],
    ["Анонсирован",properties["Year of project announcement"]],
    ["Тип территории",properties["Category"]],
    ["Статус проекта",properties["Project status"]],
    ["Площадь, км²",properties["Area (km²)"]]
  ];

  const rowsHtml = rows.map(([label,value]) => `
    <div class="city-popup__row">
      <div class="city-popup__label">${escapeHtml(label)}</div>
      <div class="city-popup__value">${formatValue(value)}</div>
    </div>
  `).join("");

  const title = formatValue(properties["Name"]);
  const website = normalizeUrl(properties["website"]);

  const titleHtml = website
    ? `<a href="${escapeHtml(website)}" target="_blank" rel="noopener noreferrer">${title}<span class="city-popup__ext">↗</span></a>`
    : title;

  return `
    <div class="city-popup">
      <h3 class="city-popup__title">${titleHtml}</h3>
      <div class="city-popup__table">
        ${rowsHtml}
      </div>
    </div>
  `;
}

function renderTabs(){
  const tabs = document.getElementById('tabs');

  // Создаём кнопки только один раз, потом только переключаем класс
  if (!tabs.children.length) {
    Object.values(MODES).forEach(mode => {
      const btn = document.createElement('button');
      btn.className = 'tab';
      btn.type = 'button';
      btn.dataset.mode = mode.key;

      const previewStyle = mode.preview
        ? `background-image:url('${mode.preview}');`
        : '';

      btn.innerHTML = `
        <div class="tab-preview" style="${previewStyle}">
          <div class="tab-label-wrap">
            <span class="tab-mode-label">${mode.label}</span>
          </div>
        </div>
      `;

      btn.addEventListener('click', () => {
        activeMode = mode.key;
        applyMode();
        renderTabs();
        renderLegend();
      });

      tabs.appendChild(btn);
    });
  }

  // Переключаем класс is-active без пересоздания DOM
  Array.from(tabs.children).forEach(btn => {
    if (btn.dataset.mode === activeMode) {
      btn.classList.add('is-active');
    } else {
      btn.classList.remove('is-active');
    }
  });
}

function renderLegend(){
  const mode = MODES[activeMode];
  const panel = document.querySelector('.legend-panel');
  const title = document.getElementById('legend-title');
  const items = document.getElementById('legend-items');
  const sizeRow = document.getElementById('legend-size-row');

  // Плавное исчезновение, замена содержимого, плавное появление
  panel.style.opacity = '0';

  setTimeout(() => {
    // задержка 150ms — совпадает с transition:opacity 0.15s на .legend-panel
    title.textContent = mode.legendTitle;
    items.innerHTML = '';
    sizeRow.innerHTML = '';
    sizeRow.style.display = 'none';

    if (mode.type === 'categorical') {
      mode.legend.forEach(item => {
        const row = document.createElement('div');
        row.className = 'legend-item';
        row.innerHTML = `
          <span class="legend-dot" style="background:${item.color}"></span>
          <span>${item.label}</span>
        `;
        items.appendChild(row);
      });
    }

    if (mode.type === 'size') {
      sizeRow.style.display = 'flex';
      sizeRow.innerHTML = `
        <span>${mode.legendMin}</span>
        <span class="size-dot" style="width:14px;height:14px;background:${mode.color};opacity:0.35;"></span>
        <span class="size-dot" style="width:26px;height:26px;background:${mode.color};opacity:0.55;"></span>
        <span class="size-dot" style="width:40px;height:40px;background:${mode.color};opacity:0.75;"></span>
        <span>${mode.legendMax}</span>
      `;
    }

    panel.style.opacity = '1';
  }, 150);
}

function getLargeDefaultRadiusExpression(){
  return [
    'interpolate',
    ['linear'],
    ['zoom'],
    0, 3,
    6, 5,
    10, 8
  ];
}

function getAreaRadiusExpression(){
  return [
    'interpolate',
    ['linear'],
    ['to-number', ['coalesce', ['get', 'Area (km²)'], 0]],
    1, 2,
    20, 4,
    60, 7,
    120, 10
  ];
}

function categoricalColorExpression(property, colors, fallback='#bdbdbd'){
  const expr = ['match', ['downcase', ['coalesce', ['get', property], '']]];
  Object.entries(colors).forEach(([key, value]) => {
    expr.push(key.toLowerCase(), value);
  });
  expr.push(fallback);
  return expr;
}

function applyMode(){
  if (!map.getLayer('new-cities-dot')) return;

  // Плавные переходы для точек на карте (цвет, прозрачность, размер)
  var t = {duration:250};
  map.setPaintProperty('new-cities-dot','circle-color-transition',t);
  map.setPaintProperty('new-cities-dot','circle-opacity-transition',t);
  map.setPaintProperty('new-cities-dot','circle-radius-transition',t);

  if (activeMode === 'allCities') {
    map.setPaintProperty('new-cities-dot', 'circle-color', '#111111');
    map.setPaintProperty('new-cities-dot', 'circle-opacity', 1);
    map.setPaintProperty('new-cities-dot', 'circle-radius', getLargeDefaultRadiusExpression());
  }

  if (activeMode === 'cityType') {
    map.setPaintProperty(
      'new-cities-dot',
      'circle-color',
      categoricalColorExpression(MODES.cityType.property, MODES.cityType.colors, '#d0d0d0')
    );
    map.setPaintProperty('new-cities-dot', 'circle-opacity', 1);
    map.setPaintProperty('new-cities-dot', 'circle-radius', getLargeDefaultRadiusExpression());
  }

  if (activeMode === 'projectStatus') {
    map.setPaintProperty(
      'new-cities-dot',
      'circle-color',
      categoricalColorExpression(MODES.projectStatus.property, MODES.projectStatus.colors, '#d0d0d0')
    );
    map.setPaintProperty('new-cities-dot', 'circle-opacity', 1);
    map.setPaintProperty('new-cities-dot', 'circle-radius', getLargeDefaultRadiusExpression());
  }

  if (activeMode === 'area') {
    map.setPaintProperty('new-cities-dot', 'circle-color', MODES.area.color);
    map.setPaintProperty('new-cities-dot', 'circle-opacity', 0.55);
    map.setPaintProperty('new-cities-dot', 'circle-radius', getAreaRadiusExpression());
  }
}

map.on('load', () => {

  map.addSource('selected-city',{
    type:'geojson',
    data:{
      type:'FeatureCollection',
      features:[]
    }
  });

  map.addLayer({
    id:'selected-city-dot',
    type:'circle',
    source:'selected-city',
    paint:{
      'circle-radius':5,
      'circle-color':'#2F6BFF'
    }
  });

  applyMode();
  renderTabs();
  renderLegend();

  map.addInteraction("hover-city",{
    type:"mouseenter",
    target:{layerId:"new-cities-dot"},
    handler:(e)=>{
      map.getCanvas().style.cursor='pointer';

      const feature = e.feature;
      const coordinates = [...feature.geometry.coordinates];
      const name = feature.properties.Name;

      if(tooltip) tooltip.remove();

      tooltip = new mapboxgl.Popup({
        closeButton:false,
        closeOnClick:false,
        offset:[0,-10],
        className:"city-hover-tooltip"
      })
      .setLngLat(coordinates)
      .setHTML(escapeHtml(name))
      .addTo(map);
    }
  });

  map.addInteraction("leave-city",{
    type:"mouseleave",
    target:{layerId:"new-cities-dot"},
    handler:()=>{
      map.getCanvas().style.cursor='';

      if(tooltip){
        tooltip.remove();
        tooltip = null;
      }
    }
  });

  map.addInteraction("click-city",{
    type:"click",
    target:{layerId:"new-cities-dot"},
    handler:(e)=>{

      const feature = e.feature;
      const coordinates = [...feature.geometry.coordinates];
      const properties = feature.properties;

      if(tooltip){
        tooltip.remove();
        tooltip = null;
      }

      map.getSource('selected-city').setData({
        type:'FeatureCollection',
        features:[{
          type:'Feature',
          geometry:{
            type:'Point',
            coordinates
          }
        }]
      });

      if(popup) popup.remove();

      popup = new mapboxgl.Popup({
        offset:[0,-12],
        maxWidth:'400px'
      })
      .setLngLat(coordinates)
      .setHTML(buildPopupHtml(properties))
      .addTo(map);
    }
  });
});
</script>
</body>
</html>
