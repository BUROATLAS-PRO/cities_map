<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Atlas of New Cities</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.js"></script>

<style>

body{
margin:0;
padding:0;
}

#map{
position:absolute;
top:0;
bottom:0;
width:100%;
}

/* popup */

.mapboxgl-popup{
max-width:360px;
}

.mapboxgl-popup-content{
padding:0;
border-radius:8px;
border:1px solid rgba(0,0,0,0.08);
box-shadow:0 10px 30px rgba(0,0,0,0.18);
overflow:hidden;
background:white;
}

.mapboxgl-popup-close-button{
display:none;
}

.city-popup{
padding:20px;
font-family:Arial,sans-serif;
}

.city-popup__title{
margin:0 0 14px;
font-size:24px;
font-weight:700;
}

.city-popup__title a{
color:#1a1a1a;
text-decoration:none;
}

.city-popup__title a:hover{
text-decoration:underline;
}

.city-popup__table{
border-top:1px solid #e8e8e8;
}

.city-popup__row{
display:grid;
grid-template-columns:150px 1fr;
gap:14px;
padding:9px 0;
border-top:1px solid #efefef;
}

.city-popup__label{
font-size:13px;
color:#8b8b8b;
}

.city-popup__value{
font-size:13px;
font-weight:600;
color:#1f1f1f;
text-align:left;
}

</style>
</head>

<body>

<div id="map"></div>

<script>

mapboxgl.accessToken='pk.eyJ1IjoiZXZnZW5peWEtZGlnaXRhbCIsImEiOiJjbW1hc2wzbDEwZnh5MnBzOXEzZmQ5Zms4In0.54xcK45nfKeeg-Z6-m7cfg';

const map=new mapboxgl.Map({
container:'map',
center:[15,18],
zoom:1.2,
style:'mapbox://styles/evgeniya-digital/cmmatecv1006q01scb0esdbuu'
});

map.addControl(new mapboxgl.NavigationControl(),'top-right');


function escapeHtml(value){
return String(value ?? '')
.replace(/&/g,'&amp;')
.replace(/</g,'&lt;')
.replace(/>/g,'&gt;')
.replace(/"/g,'&quot;')
.replace(/'/g,'&#39;');
}

function formatValue(value){
if(value===null || value===undefined || value==="")
return "—";
return escapeHtml(value);
}

function normalizeUrl(url){
if(!url) return "";
const trimmed=String(url).trim();
if(/^https?:\/\//i.test(trimmed)) return trimmed;
return "https://"+trimmed;
}


function buildPopupHtml(properties){

const rows=[

["Страна",properties["Country"]],

["Анонсирован",properties["Year of project announcement"]],

["Тип территории",properties["Category"]],

["Статус проекта",properties["Project status"]],

["Площадь, км²",properties["Area (km²)"]]

];


const rowsHtml=rows.map(([label,value])=>`

<div class="city-popup__row">
<div class="city-popup__label">${escapeHtml(label)}</div>
<div class="city-popup__value">${formatValue(value)}</div>
</div>

`).join("");


const title=formatValue(properties["Name"]);
const website=normalizeUrl(properties["website"]);

const titleHtml=website
? `<a href="${escapeHtml(website)}" target="_blank">${title}</a>`
: title;


return `

<div class="city-popup">

<h3 class="city-popup__title">${titleHtml}</h3>

<div class="city-popup__table">
${rowsHtml}
</div>

</div>

`;
}



let selectedCityId=null;
let popup=null;


map.on('load',()=>{

/* цвет точек через feature-state */

map.setPaintProperty(
'new-cities-dot',
'circle-color',
[
'case',
['boolean',['feature-state','selected'],false],
'#2F6BFF',     /* активная точка */
'#000000'      /* обычные точки */
]
);


/* CLICK interaction */

map.addInteraction("click-city",{

type:"click",

target:{layerId:"new-cities-dot"},

handler:(e)=>{

const feature=e.feature;
const id=feature.id;

const coordinates=[...feature.geometry.coordinates];


/* убрать выделение предыдущей точки */

if(selectedCityId!==null){

map.setFeatureState(
{source:feature.source,id:selectedCityId},
{selected:false}
);

}


/* выделить текущую */

selectedCityId=id;

map.setFeatureState(
{source:feature.source,id:id},
{selected:true}
);


/* popup */

if(popup) popup.remove();

popup=new mapboxgl.Popup({
closeButton:true,
offset:[0,-10]
})
.setLngLat(coordinates)
.setHTML(buildPopupHtml(feature.properties))
.addTo(map);

}

});

});


</script>

</body>
</html>
