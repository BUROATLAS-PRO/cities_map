<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Atlas of New Cities</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.js"></script>
<style>
body {
  margin: 0;
  padding: 0;
}

#map {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 100%;
}

.mapboxgl-popup {
  max-width: 320px;
}

.mapboxgl-popup-content {
  padding: 0;
  border-radius: 6px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
  border: 1px solid rgba(0, 0, 0, 0.08);
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.mapboxgl-popup-close-button {
  display: none;
}

.city-popup {
  padding: 18px 18px 14px;
  background: #ffffff;
  color: #1f1f1f;
}

.city-popup__title {
  margin: 0 0 14px;
  font-size: 24px;
  line-height: 1.15;
  font-weight: 700;
}

.city-popup__row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: end;
  padding: 8px 0;
  border-top: 1px solid #ececec;
}

.city-popup__row:first-of-type {
  border-top: 1px solid #ececec;
}

.city-popup__label {
  font-size: 14px;
  line-height: 1.25;
  color: #8a8a8a;
}

.city-popup__value {
  font-size: 14px;
  line-height: 1.25;
  font-weight: 600;
  color: #1f1f1f;
  text-align: right;
}
</style>
</head>
<body>
<div id="map"></div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiZXZnZW5peWEtZGlnaXRhbCIsImEiOiJjbW1hc2wzbDEwZnh5MnBzOXEzZmQ5Zms4In0.54xcK45nfKeeg-Z6-m7cfg';

const map = new mapboxgl.Map({
  container: 'map',
  center: [36.646339, 55.776132],
  style: 'mapbox://styles/evgeniya-digital/cmmatecv1006q01scb0esdbuu',
  zoom: 2
});

map.addControl(new mapboxgl.NavigationControl(), 'top-right');

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatValue(value) {
  if (value === null || value === undefined || value === '') return '—';
  return escapeHtml(value);
}

function buildPopupHtml(properties) {
  const rows = [
    ['Страна', properties['Country']],
    ['Год анонсирования проекта', properties['Year of project announcement']],
    ['Тип территории', properties['Category']],
    ['Статус проекта', properties['Project status']],
    ['Площадь, км²', properties['Area (km²)']]
  ];

  const rowsHtml = rows.map(([label, value]) => `
    <div class="city-popup__row">
      <div class="city-popup__label">${escapeHtml(label)}</div>
      <div class="city-popup__value">${formatValue(value)}</div>
    </div>
  `).join('');

  return `
    <div class="city-popup">
      <h3 class="city-popup__title">${formatValue(properties['Name'])}</h3>
      ${rowsHtml}
    </div>
  `;
}

map.on('load', () => {
  const hoverLayers = ['new-cities-dot'];
  let hoverPopup = null;

  hoverLayers.forEach((layer, index) => {
    map.addInteraction(`hover-popup-${index}`, {
      type: 'mouseenter',
      target: { layerId: layer },
      handler: (e) => {
        map.getCanvas().style.cursor = 'pointer';

        const coordinates = [...e.feature.geometry.coordinates];
        const properties = e.feature.properties || {};

        if (hoverPopup) {
          hoverPopup.remove();
        }

        hoverPopup = new mapboxgl.Popup({
          closeButton: false,
          closeOnClick: false,
          offset: [0, -14],
          className: 'city-hover-popup'
        })
          .setLngLat(coordinates)
          .setHTML(buildPopupHtml(properties))
          .addTo(map);
      }
    });

    map.addInteraction(`hover-leave-${index}`, {
      type: 'mouseleave',
      target: { layerId: layer },
      handler: () => {
        map.getCanvas().style.cursor = '';
        if (hoverPopup) {
          hoverPopup.remove();
          hoverPopup = null;
        }
      }
    });
  });
});
</script>
</body>
</html>
